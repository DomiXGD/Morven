services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-morven}
      POSTGRES_USER: ${POSTGRES_USER:-morven_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-morven_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-morven_user} -d ${POSTGRES_DB:-morven}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/sql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-4001}
      DATABASE_URL: ${DATABASE_URL:-postgresql://morven_user:morven_password@db:5432/morven}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-morven-admin-key}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-4001}:4001"

volumes:
  postgres_data:
